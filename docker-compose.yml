services:
  postgres:
    image: postgres:16
    container_name: compras_postgres
    restart: always
    environment:
      POSTGRES_DB: compras_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - compras_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: compras_redis
    restart: always
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    container_name: compras_ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - compras_ollama_data:/root/.ollama

  backend:
    build:
      context: ./backend
    container_name: compras_backend
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./database:/app/database
    depends_on:
      - postgres
      - redis
      - ollama
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker_1:
    build:
      context: ./backend
    container_name: compras_worker_1
    restart: always
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./database:/app/database
    depends_on:
      - postgres
      - redis
      - ollama
    command: rq worker invoices --url redis://redis:6379/0

  worker_2:
    build:
      context: ./backend
    container_name: compras_worker_2
    restart: always
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./database:/app/database
    depends_on:
      - postgres
      - redis
      - ollama
    command: rq worker invoices --url redis://redis:6379/0

volumes:
  compras_postgres_data:
  compras_ollama_data:
